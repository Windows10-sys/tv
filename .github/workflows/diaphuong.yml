          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=camau" -c copy -f flv rtmp://42.1.99.192/live/camau &
          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=cantho1" -c copy -f flv rtmp://42.1.99.192/live/cantho1 &
          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=cantho2" -c copy -f flv rtmp://42.1.99.192/live/cantho2 &
          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=cantho3" -c copy -f flv rtmp://42.1.99.192/live/cantho3 &
          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=daklak" -c copy -f flv rtmp://42.1.99.192/live/daklak &
