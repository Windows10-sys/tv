name: Stream All Local

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  local-1:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Start Streaming Local 1
        run: |
          sudo apt-get update && sudo apt-get install -y ffmpeg
          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=angiang1" -c copy -f flv rtmp://42.1.99.192/live/angiang1 &
          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=angiang2" -c copy -f flv rtmp://42.1.99.192/live/angiang2 &
          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=angiang3" -c copy -f flv rtmp://42.1.99.192/live/angiang3 &
          ffmpeg -re -i "https://sgchill.duckdns.org/source/fptplay.m3u8?id=bacninh" -c copy -f flv rtmp://42.1.99.192/live/bacninh &
